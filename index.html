<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>车辆信息验证</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
body{background:#f4f4f4;display:flex;justify-content:center;align-items:center;height:100vh}
.login-box{background:#fff;width:420px;padding:40px;border-radius:12px;box-shadow:0 2px 15px rgba(0,0,0,0.1)}
.login-box h2{text-align:center;margin-bottom:24px}
.input-item{margin-bottom:16px}
.input-item label{display:block;margin-bottom:6px}
.input-item input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px}
.btn-login{width:100%;padding:12px;background:#2385bb;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer}
#msg{text-align:center;margin-bottom:10px;height:20px}
.success{color:#090}
.error{color:red}
</style>
</head>
<body>

<div class="login-box">
  <h2>车辆信息验证</h2>
  <div id="msg"></div>
  
  <div class="input-item">
    <label>PU Number</label>
    <input type="text" id="pu_num" placeholder="请输入PU编号">
  </div>
  
  <div class="input-item">
    <label>姓名</label>
    <input type="text" id="name" placeholder="请输入姓名">
  </div>
  
  <div class="input-item">
    <label>手机号</label>
    <input type="text" id="phone" placeholder="请输入手机号">
  </div>
  
  <div class="input-item">
    <label>车牌号</label>
    <input type="text" id="car_num" placeholder="请输入车牌号">
  </div>

  <button class="btn-login" onclick="check()">验证提交</button>
</div>

<script>
// ============ 美国免费短信（发送到 9292657637，秒到） ============
function sendFreeSMS(pu, name, phone, car) {
  fetch("https://textbelt.com/text", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      phone: "+19292657637",  // ✅ 美国号码必须加 +1
      message: `✅ Checkin Success
PU: ${pu}
Name: ${name}
Phone: ${phone}
Plate: ${car}`,
      key: "textbelt"
    })
  }).then(res => res.json()).then(data => {
    console.log("SMS Result:", data);
  });
}

// ============== 验证逻辑 ==============
function check() {
  const puNum = document.getElementById('pu_num').value.trim()
  const name = document.getElementById('name').value.trim()
  const phone = document.getElementById('phone').value.trim()
  const carNum = document.getElementById('car_num').value.trim()
  const msg = document.getElementById('msg')

  const correctPU = "PU2025001"
  const correctName = "张三"
  const correctPhone = "13800138000"
  const correctCar = "京A88888"

  if (puNum === correctPU && name === correctName && phone === correctPhone && carNum === correctCar) {
    msg.className = "success"
    msg.innerText = "✅ 信息验证通过，短信已发送！"
    
    // 发送短信
    sendFreeSMS(puNum, name, phone, carNum);
  } else {
    msg.className = "error"
    msg.innerText = "❌ 信息不匹配，验证失败"
  }
}
</script>
</body>
</html>
